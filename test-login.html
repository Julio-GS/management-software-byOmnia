<!DOCTYPE html>
<html>
<head><title>Test Login</title></head>
<body>
<h1>Test Backend Login Response</h1>
<button onclick="testLogin()">Test Login</button>
<pre id="result"></pre>
<script>
async function testLogin() {
  const result = document.getElementById("result");
  result.textContent = "Testing...";
  
  try {
    const response = await fetch("http://localhost:8080/api/v1/auth/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ 
        email: "admin@omnia.com", 
        password: "Admin123!" 
      })
    });
    
    result.textContent = "Status: " + response.status + "\n";
    result.textContent += "Status Text: " + response.statusText + "\n\n";
    
    const data = await response.json();
    result.textContent += "Response Body:\n" + JSON.stringify(data, null, 2);
  } catch (error) {
    result.textContent = "Error: " + error.message + "\n" + error.stack;
  }
}
</script>
</body>
</html>
