# Railway Monorepo Configuration
# This file tells Railway how to handle the monorepo structure

# Backend Service
[[services]]
name = "backend"
source = "apps/backend"
buildCommand = "pnpm install && pnpm --filter @omnia/shared-types build && pnpm --filter @omnia/api-client build && pnpm --filter @omnia/backend build"
dockerfile = "apps/backend/Dockerfile.backend"

# Watch patterns - triggers rebuild only when these paths change
watch = [
  "apps/backend/**",
  "packages/shared-types/**",
  "packages/api-client/**",
  "package.json",
  "pnpm-lock.yaml",
  "pnpm-workspace.yaml"
]

# Frontend Service
[[services]]
name = "frontend"
source = "apps/web"
buildCommand = "pnpm install && pnpm --filter @omnia/shared-types build && pnpm --filter @omnia/api-client build && pnpm --filter @omnia/web build"
dockerfile = "apps/web/Dockerfile.frontend"

# Watch patterns - triggers rebuild only when these paths change
watch = [
  "apps/web/**",
  "packages/shared-types/**",
  "packages/api-client/**",
  "package.json",
  "pnpm-lock.yaml",
  "pnpm-workspace.yaml"
]
